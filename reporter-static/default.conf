server {
  listen 80 default_server;
  server_name _;

  root /mnt/qa-reports;
  charset utf-8;
  default_type text/plain;

  # Auto-index the reports directory so testers can browse runs by date.
  autoindex on;
  autoindex_exact_size off;
  autoindex_localtime on;

  location / {
    try_files $uri $uri/ =404;
  }

  # Render markdown as plain text in browsers that don't have a markdown viewer.
  location ~* \.md$ {
    add_header Content-Type "text/plain; charset=utf-8";
  }

  # JSON gets the right MIME so devtools renders it.
  location ~* \.json$ {
    add_header Content-Type "application/json; charset=utf-8";
  }

  # Long cache for screenshots — they're immutable per-run.
  location ~* \.(png|jpg|jpeg)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Health check for Traefik.
  location /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
