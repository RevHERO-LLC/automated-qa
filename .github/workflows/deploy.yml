# Build + push the QA runner + reporter-static images to GHCR, then ask
# Dokploy to redeploy. Mirrors the deployment pattern used by the 13 service
# repos (ghcr.io/revhero-llc/...).
name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - 'shared/**'
      - 'reporter-static/**'
      - 'trigger/**'
      - 'registry.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  RUNNER_IMAGE: revhero-llc/revhero-automated-qa-runner
  STATIC_IMAGE: revhero-llc/revhero-automated-qa-static
  TRIGGER_IMAGE: revhero-llc/revhero-automated-qa-trigger

jobs:
  build-runner:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.RUNNER_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.RUNNER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push static image
        uses: docker/build-push-action@v6
        with:
          context: reporter-static
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.STATIC_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.STATIC_IMAGE }}:${{ github.sha }}

  build-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push trigger image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trigger/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.TRIGGER_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.TRIGGER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  redeploy:
    runs-on: ubuntu-latest
    needs: [build-runner, build-static, build-trigger]
    steps:
      - name: Trigger Dokploy redeploy (runner)
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
        run: |
          curl -fsSL -X POST \
            -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "http://147.93.1.174:3000/api/application.deploy" \
            -d '{"applicationId":"${{ vars.QA_RUNNER_APP_ID }}"}'
      - name: Trigger Dokploy redeploy (static)
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
        run: |
          curl -fsSL -X POST \
            -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "http://147.93.1.174:3000/api/application.deploy" \
            -d '{"applicationId":"${{ vars.QA_STATIC_APP_ID }}"}'
      - name: Trigger Dokploy redeploy (trigger)
        if: vars.QA_TRIGGER_APP_ID != ''
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
        run: |
          curl -fsSL -X POST \
            -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "http://147.93.1.174:3000/api/application.deploy" \
            -d '{"applicationId":"${{ vars.QA_TRIGGER_APP_ID }}"}'
