# Daily scheduled QA run + manual workflow_dispatch trigger.
#
# Architecture: this workflow is the issue-management layer for the runner.
# The runner container only writes report.md/json into the shared volume;
# this workflow reads the report from the static endpoint after the run
# completes and uses the auto-scoped GITHUB_TOKEN (issues:write) to open,
# update, and close issues for each FAIL — no PAT lives in the container.
name: qa-staging

on:
  schedule:
    - cron: '7 7 * * *' # 2 AM ET — avoid the :00 hot-zone
  workflow_dispatch:
    inputs:
      slice:
        description: "Tag filter to run (p0, p1, smoke, etc). Empty = full suite."
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  trigger-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Dokploy QA-runner redeploy (runs the suite)
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          QA_RUNNER_APP_ID: ${{ vars.QA_RUNNER_APP_ID }}
        run: |
          curl -fsSL -X POST \
            -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "http://147.93.1.174:3000/api/application.deploy" \
            -d "{\"applicationId\":\"${QA_RUNNER_APP_ID}\"}"

      - name: Wait for Dokploy run to finish
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          QA_RUNNER_APP_ID: ${{ vars.QA_RUNNER_APP_ID }}
        run: |
          # Poll application.status every 15s for up to 30 minutes.
          deadline=$(( $(date +%s) + 1800 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            status=$(curl -fsSL \
              -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
              "http://147.93.1.174:3000/api/application.one?applicationId=${QA_RUNNER_APP_ID}" \
              | jq -r '.applicationStatus // "unknown"')
            echo "Dokploy status: $status"
            if [[ "$status" == "done" || "$status" == "idle" ]]; then
              break
            fi
            if [[ "$status" == "error" ]]; then
              echo "::error::Dokploy reported error during QA run"
              exit 1
            fi
            sleep 15
          done

      - name: Fetch latest QA report
        run: |
          # The static reporter serves the volume the runner just wrote to.
          # Allow a few seconds for nginx to see the new files.
          sleep 10
          curl -fsSLk https://qa-reports.test.revhero.io/latest.json -o /tmp/latest.json
          jq '.summary | {run_id, finished_at, total, passed, failed, skipped, not_exec}' /tmp/latest.json

      - name: Sync GitHub Issues for failed tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: bash scripts/sync-qa-issues.sh /tmp/latest.json registry.json

      - name: Fail the workflow on CRITICAL failures
        run: |
          set -euo pipefail
          critical_fails=$(jq -r '
            [.summary.results[] | select(.status == "FAIL") | .id] as $failed
            | input.entries
            | map(select(.id as $i | $failed | index($i)))
            | map(select(.severity == "critical"))
            | length
          ' /tmp/latest.json registry.json)
          echo "CRITICAL fail count: $critical_fails"
          if [[ "$critical_fails" -gt 0 ]]; then
            echo "::error::$critical_fails CRITICAL test(s) failing"
            exit 1
          fi
