# Scrape-status reconciler (#602).
#
# Backfills deal_configurations.scraped_on + deal_configurations.aws_website_text_link
# from S3 object metadata for every deal whose config columns are still blank.
#
# The scraper writes text to S3 but never updated these cosmetic tracking columns.
# This reconciler is the scheduled fix — no scraper changes required.
#
# Schedule: daily at 06:30 UTC (after the PIQ aggregator's 06:00 window).
#
# Manual dispatch: use workflow_dispatch with dry_run=true for a safe first
# validation run (logs what WOULD change, writes nothing).
# The scheduled run uses DRY_RUN=false and performs real writes.
#
# AWS auth: OIDC role-assume via aws-actions/configure-aws-credentials@v4,
# mirroring the pattern from AI-data-lake/deploy-scrapers.yml (the only RevHero
# workflow that touches S3). Requires AWS_DEPLOY_ROLE_ARN secret + id-token
# write permission.
#
# DB secret: CAMPAIGN_DB_DSN — a Postgres DSN for the campaign DB (VPS4).
# This secret does NOT yet exist in the automated-qa repo/org secrets; the
# operator must create it before the workflow can write to Postgres.
# See README.md for the expected DSN format.
name: Scrape-status reconciler (#602)

on:
  schedule:
    - cron: "30 6 * * *"   # 06:30 UTC daily — after PIQ aggregator (06:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (true = log only, no DB writes). Default: false for dispatch."
        required: false
        default: "false"

permissions:
  id-token: write   # required for OIDC AWS role-assume
  contents: read

jobs:
  reconcile:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --quiet boto3 psycopg2-binary

      - name: Determine DRY_RUN value
        id: dry_run
        run: |
          # Scheduled runs always write (DRY_RUN=false).
          # Dispatch runs use the caller's input (default "false").
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scrape-status reconciler
        env:
          DB_DSN: ${{ secrets.CAMPAIGN_DB_DSN }}
          PROCESSED_BUCKET: leadenrichstack-processeddatabucket4e25d3b7-srglu6vbtymz
          DRY_RUN: ${{ steps.dry_run.outputs.value }}
          # LIMIT: unset — process all rows. Set to a number for a test run.
        run: |
          set -euo pipefail
          if [[ -z "${DB_DSN:-}" ]]; then
            echo "::error::CAMPAIGN_DB_DSN secret is not set. Add it to the automated-qa repo (or org) secrets."
            exit 1
          fi
          python ops/scrape-reconciler/reconcile.py
