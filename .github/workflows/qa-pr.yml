# Per-PR QA run gated by workflow_dispatch + status check.
# Service-repo deploy-prod.yml workflows dispatch this with `ref` and
# `slice` inputs so we can run a filtered slice against the PR's image.
name: qa-pr

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Source ref to test (sha or branch)"
        required: true
        default: "main"
      slice:
        description: "Tag filter (p0, smoke, critical, etc). Empty = full suite."
        required: false
        default: "p0"
      caller:
        description: "Calling repo for cross-reference in reports"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  trigger-run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy QA-runner redeploy
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          QA_RUNNER_APP_ID: ${{ vars.QA_RUNNER_APP_ID }}
        run: |
          curl -fsSL -X POST \
            -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "http://147.93.1.174:3000/api/application.deploy" \
            -d "{\"applicationId\":\"${QA_RUNNER_APP_ID}\"}"

      - name: Wait for completion
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          QA_RUNNER_APP_ID: ${{ vars.QA_RUNNER_APP_ID }}
        run: |
          deadline=$(( $(date +%s) + 1800 ))
          while [[ $(date +%s) -lt $deadline ]]; do
            status=$(curl -fsSL \
              -H "X-API-Key: ${DOKPLOY_API_TOKEN}" \
              "http://147.93.1.174:3000/api/application.one?applicationId=${QA_RUNNER_APP_ID}" \
              | jq -r '.applicationStatus // "unknown"')
            echo "Dokploy status: $status"
            if [[ "$status" == "done" || "$status" == "idle" ]]; then exit 0; fi
            if [[ "$status" == "error" ]]; then exit 1; fi
            sleep 15
          done
          exit 1
